<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LankaDrive - Chen's Notation ER Diagram</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: #f1f5f9;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 {
      color: #1e3a5f;
      margin-bottom: 8px;
    }
    p.subtitle {
      color: #64748b;
      margin-top: 0;
      margin-bottom: 24px;
      font-size: 14px;
    }
    .diagram-wrapper {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
      padding: 16px;
      overflow: auto;
      max-width: 98vw;
      max-height: 88vh;
    }
    .diagram-container {
      min-width: 1800px;
      min-height: 1000px;
    }
    .diagram-container svg,
    .diagram-container img,
    .diagram-container object {
      display: block;
      width: 100%;
      height: auto;
    }
    .note {
      margin-top: 20px;
      color: #64748b;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h1>LankaDrive - Entity Relationship Diagram</h1>
  <p class="subtitle">Chen's Notation &nbsp;|&nbsp; Rectangles = Entities, Diamonds = Relationships, Ovals = Attributes</p>
  <div class="diagram-wrapper">
    <div class="diagram-container">
      <object data="chen_er_diagram.svg" type="image/svg+xml" width="1800" height="1000">
        <img src="chen_er_diagram.svg" alt="ER Diagram" width="1800" height="1000">
      </object>
    </div>
  </div>
  <p class="note">SVG file saved as: <code>chen_er_diagram.svg</code></p>
</body>
</html>
